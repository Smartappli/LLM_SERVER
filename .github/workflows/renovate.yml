name: renovate

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.8
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
