      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          file: ./Docker/rocm/rocm.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: smartappli/llama-cpp-python-server-rocm:latest


  docker-vulkan:
